<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PDF PIBG | TABIKA KEMAS</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Segoe UI",sans-serif;
    }

    body{
      background:#f4f9ff;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* NAVBAR */
    .navbar{
      background:#4f8cff;
      color:white;
      padding:15px 25px;

      display:flex;
      justify-content:space-between;
      align-items:center;

      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    .navbar h1{
      font-size:20px;
    }

    .navbar a{
      text-decoration:none;
      color:white;
      background:#ffcf5c;
      padding:10px 18px;
      border-radius:999px;
      font-weight:bold;
    }

    /* HEADER */
    .header{
      text-align:center;
      padding:30px 20px 20px;
    }

    .header h2{
      font-size:38px;
      color:#24324b;
      margin-bottom:10px;
    }

    .header p{
      color:#667085;
    }

    /* PDF */
    .pdf-container{
      flex:1;
      padding:20px;
    }

    iframe{
      width:100%;
      height:80vh;
      border:none;
      border-radius:20px;
      background:white;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
    }

    /* MOBILE */
    @media(max-width:768px){

      .navbar{
        flex-direction:column;
        gap:12px;
        text-align:center;
      }

      .header h2{
        font-size:28px;
      }

      iframe{
        height:75vh;
      }

    }

  </style>
</head>
<body>

  <nav class="navbar">
    <h1>📘 Buku Program PIBG</h1>

    <a href="index.html">⬅ Kembali</a>
  </nav>

  <section class="header">
    <h2>Mesyuarat PIBG</h2>

    <p>
      Sila lihat buku program rasmi TABIKA KEMAS Rumah Pangsa di bawah.
    </p>
  </section>

  <div class="pdf-container">

    <!-- PDF VIEWER -->
    <iframe src="PIBG.pdf"></iframe>

  </div>

</body>
</html>
